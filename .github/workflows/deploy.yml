name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ]; then
            echo "Missing GitHub secrets: VPS_HOST, VPS_USER, VPS_SSH_PRIVATE_KEY"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key \
            "${VPS_USER}@${VPS_HOST}" \
            'bash /usr/src/taxi-crm-miniApp/MiniApp_Bot_CRM_Taxi/scripts/vps-update.sh'
