services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "${LOCAL_DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-taxi}
      MYSQL_USER: ${MYSQL_USER:-taxi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me-strong-password}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-taxi}:${MYSQL_PASSWORD:-change-me-strong-password}@db:3306/${MYSQL_DATABASE:-taxi}
      BOT_TOKEN: ${BOT_TOKEN}
      TELEGRAM_SUPERADMIN_ID: ${TELEGRAM_SUPERADMIN_ID}
      PUBLIC_URL: ${PUBLIC_URL}
      API_PORT: 3000
      CORS_ORIGINS: ${PUBLIC_URL}
      RUN_SCHEDULER: ${RUN_SCHEDULER:-true}
      REMINDER_DAYS_BEFORE: ${REMINDER_DAYS_BEFORE:-7}
      REMINDER_CRON: ${REMINDER_CRON:-0 9 * * *}
    volumes:
      - uploads:/app/apps/api/uploads
    expose:
      - "3000"

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      BOT_TOKEN: ${BOT_TOKEN}
      TELEGRAM_SUPERADMIN_ID: ${TELEGRAM_SUPERADMIN_ID}
      PUBLIC_URL: ${PUBLIC_URL}

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    depends_on:
      - api
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  mysql_data:
  uploads:
  caddy_data:
  caddy_config:
