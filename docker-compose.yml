services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      BOT_TOKEN: ${BOT_TOKEN}
      TELEGRAM_SUPERADMIN_ID: ${TELEGRAM_SUPERADMIN_ID}
      PUBLIC_URL: ${PUBLIC_URL}
      API_PORT: 3000
      CORS_ORIGINS: ${PUBLIC_URL}
      RUN_SCHEDULER: ${RUN_SCHEDULER:-true}
      REMINDER_DAYS_BEFORE: ${REMINDER_DAYS_BEFORE:-7}
      REMINDER_CRON: ${REMINDER_CRON:-0 9 * * *}
    volumes:
      - uploads:/app/apps/api/uploads
    expose:
      - "3000"

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      BOT_TOKEN: ${BOT_TOKEN}
      TELEGRAM_SUPERADMIN_ID: ${TELEGRAM_SUPERADMIN_ID}
      PUBLIC_URL: ${PUBLIC_URL}

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    depends_on:
      - api
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
